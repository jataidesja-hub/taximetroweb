<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxímetro Pro - Uber & Particular</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.4) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .currency-symbol {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-weight: 600;
        }

        .display-section {
            margin: 40px 0;
            position: relative;
        }

        .total-amount {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            text-shadow: 0 0 30px var(--primary-glow);
            transition: transform 0.2s ease;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            color: var(--text);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-start {
            background: var(--primary);
            color: #0f172a;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.4);
        }

        .btn-stop {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .btn-stop:hover {
            background: var(--danger);
            color: white;
        }

        .status-badge {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .active .status-dot {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Pulsing animation for price when moving */
        .moving .total-amount {
            animation: pricePulse 0.5s ease;
        }

        @keyframes pricePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Taxímetro Pro</h1>
        
        <div class="input-group">
            <label for="valorKm">Tarifa por KM</label>
            <div class="input-wrapper">
                <input type="number" id="valorKm" value="2.50" step="0.10" inputmode="decimal">
                <span class="currency-symbol">R$</span>
            </div>
        </div>

        <div class="display-section" id="displayArea">
            <div class="total-amount" id="totalDisplay">R$ 0,00</div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="distanciaDisplay">0.00</span>
                    <label>KM Rodados</label>
                </div>
                <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 20px;">
                    <span class="stat-value" id="tempoDisplay">00:00</span>
                    <label>Tempo</label>
                </div>
            </div>
        </div>

        <button id="btnAcao" class="btn btn-start" onclick="toggleCorrida()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Iniciar Corrida
        </button>

        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span id="statusText">Aguardando...</span>
        </div>
    </div>

    <script>
        let emCorrida = false;
        let watchId = null;
        let distanciaTotal = 0;
        let ultimaPos = null;
        let wakeLock = null;
        let tempoSegundos = 0;
        let timerInterval = null;

        function formatarMoeda(valor) {
            return 'R$ ' + valor.toFixed(2).replace('.', ',');
        }

        function formatarTempo(segundos) {
            const h = Math.floor(segundos / 3600);
            const m = Math.floor((segundos % 3600) / 60);
            const s = segundos % 60;
            return [h, m, s]
                .map(v => v < 10 ? "0" + v : v)
                .filter((v, i) => v !== "00" || i > 0)
                .join(":");
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function toggleCorrida() {
            const btn = document.getElementById('btnAcao');
            const valorKm = parseFloat(document.getElementById('valorKm').value) || 0;
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            const displayArea = document.getElementById('displayArea');

            if (!emCorrida) {
                // INICIAR
                distanciaTotal = 0;
                tempoSegundos = 0;
                ultimaPos = null;
                emCorrida = true;
                
                btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Finalizar Corrida`;
                btn.className = "btn btn-stop";
                
                statusBadge.classList.add('active');
                statusText.innerText = "GPS Ativo - Em Corrida";

                // Timer
                timerInterval = setInterval(() => {
                    tempoSegundos++;
                    document.getElementById('tempoDisplay').innerText = formatarTempo(tempoSegundos);
                }, 1000);

                // Impedir tela de apagar
                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); }
                }

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    
                    if (accuracy > 30) return; // Ignorar posições imprecisas

                    if (ultimaPos) {
                        const d = calcularDistancia(ultimaPos.lat, ultimaPos.lon, latitude, longitude);
                        if (d > 0.003) { // Filtro > 3 metros
                            distanciaTotal += d;
                            
                            // Efeito visual de pulso no preço
                            displayArea.classList.add('moving');
                            setTimeout(() => displayArea.classList.remove('moving'), 500);
                        }
                    }
                    
                    ultimaPos = { lat: latitude, lon: longitude };
                    
                    document.getElementById('distanciaDisplay').innerText = distanciaTotal.toFixed(2);
                    document.getElementById('totalDisplay').innerText = formatarMoeda(distanciaTotal * valorKm);
                }, (err) => { 
                    alert("Por favor, permita o acesso ao GPS para o taxímetro funcionar!"); 
                    pararCorrida();
                }, { enableHighAccuracy: true, maximumAge: 0 });

            } else {
                pararCorrida();
            }
        }

        function pararCorrida() {
            const btn = document.getElementById('btnAcao');
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');

            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (wakeLock) {
                wakeLock.release().then(() => wakeLock = null);
            }
            if (timerInterval) clearInterval(timerInterval);

            emCorrida = false;
            btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Iniciar Nova Corrida`;
            btn.className = "btn btn-start";
            
            statusBadge.classList.remove('active');
            statusText.innerText = "Corrida Finalizada";
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail', err));
            });
        }
    </script>
</body>
</html>
