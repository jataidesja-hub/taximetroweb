<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxímetro Pro - Uber & Particular</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --bg: #000000; /* PITCH BLACK */
            --card-bg: rgba(20, 20, 20, 0.8);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            z-index: 10;
            margin-bottom: 15px;
        }

        #map {
            width: 100%;
            height: 250px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #111;
        }

        h1 {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
        }

        .display-section {
            margin: 25px 0;
            text-align: center;
        }

        .total-amount {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .stat-value {
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-start {
            background: var(--primary);
            color: #000;
        }

        .btn-stop {
            background: var(--danger);
            color: white;
        }

        /* Modal Resumo */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal {
            background: #111;
            border: 1px solid var(--primary);
            width: 100%;
            max-width: 350px;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h2 { margin-bottom: 20px; color: var(--primary); }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .summary-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .summary-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .summary-val { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }

        /* Notificação de Instalação (Redesenhada) */
        .install-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(200%);
            width: calc(100% - 30px);
            max-width: 400px;
            background: #111;
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: transform 0.5s ease;
        }
        .install-toast.show { transform: translateX(-50%) translateY(0); }

        .leaflet-container { background: #000 !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Taxímetro Pro</h1>
        
        <div id="map"></div>

        <div class="input-group">
            <label>Tarifa por KM (R$)</label>
            <input type="number" id="valorKm" value="2.50" step="0.10" inputmode="decimal">
        </div>

        <div class="display-section">
            <div class="total-amount" id="totalDisplay">R$ 0,00</div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="distanciaDisplay">0.00</span>
                    <label>KM</label>
                </div>
                <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1);">
                    <span class="stat-value" id="tempoDisplay">00:00</span>
                    <label>Tempo</label>
                </div>
            </div>
        </div>

        <button id="btnAcao" class="btn btn-start" onclick="toggleCorrida()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Iniciar Corrida
        </button>
    </div>

    <!-- Modal de Resumo -->
    <div id="summaryModal" class="modal-overlay">
        <div class="modal">
            <h2>Corrida Finalizada</h2>
            <div class="summary-grid">
                <div class="summary-box">
                    <div class="summary-label">Total Pago</div>
                    <div class="summary-val" id="sumTotal" style="color: var(--primary);">R$ 0,00</div>
                </div>
                <div class="summary-box">
                    <div class="summary-label">Distância</div>
                    <div class="summary-val" id="sumDist">0.00 km</div>
                </div>
                <div class="summary-box" style="grid-column: span 2;">
                    <div class="summary-label">Tempo Decorrido</div>
                    <div class="summary-val" id="sumTempo">0:00</div>
                </div>
            </div>
            <button class="btn btn-start" onclick="fecharModal()">OK, Nova Corrida</button>
        </div>
    </div>

    <!-- Toast de Instalação -->
    <div id="installToast" class="install-toast">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <div style="flex-grow: 1;">
            <div style="font-weight: 700; font-size: 0.85rem;">Instalar Aplicativo</div>
            <div id="installMsg" style="font-size: 0.75rem; color: var(--text-dim);">Toque aqui para usar como App</div>
        </div>
        <button id="btnVerInstall" style="background: var(--primary); border: none; padding: 6px 10px; border-radius: 8px; font-weight: 700; font-size: 0.75rem;">OK</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let emCorrida = false;
        let watchId = null;
        let distanciaTotal = 0;
        let ultimaPos = null;
        let wakeLock = null;
        let tempoSegundos = 0;
        let timerInterval = null;
        let map, pathLine, userMarker;
        let pathCoords = [];

        // Inicializar Mapa
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-23.55, -46.63], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            
            pathLine = L.polyline([], { color: '#38bdf8', weight: 5, opacity: 0.8 }).addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#38bdf8', fillOpacity: 1 }).addTo(map);
        }

        initMap();

        function formatarMoeda(valor) {
            return 'R$ ' + valor.toFixed(2).replace('.', ',');
        }

        function formatarTempo(segundos) {
            const h = Math.floor(segundos / 3600);
            const m = Math.floor((segundos % 3600) / 60);
            const s = segundos % 60;
            return [h, m, s].map(v => v < 10 ? "0" + v : v).filter((v, i) => v !== "00" || i > 0).join(":");
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function toggleCorrida() {
            if (!emCorrida) {
                // INICIAR
                distanciaTotal = 0;
                tempoSegundos = 0;
                ultimaPos = null;
                pathCoords = [];
                pathLine.setLatLngs([]);
                emCorrida = true;
                
                document.getElementById('btnAcao').innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Finalizar Corrida`;
                document.getElementById('btnAcao').className = "btn btn-stop";

                timerInterval = setInterval(() => {
                    tempoSegundos++;
                    document.getElementById('tempoDisplay').innerText = formatarTempo(tempoSegundos);
                }, 1000);

                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
                }

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    if (accuracy > 35) return;

                    const currentLatLng = [latitude, longitude];
                    userMarker.setLatLng(currentLatLng);
                    map.panTo(currentLatLng);

                    if (ultimaPos) {
                        const d = calcularDistancia(ultimaPos.lat, ultimaPos.lon, latitude, longitude);
                        if (d > 0.003) {
                            distanciaTotal += d;
                            pathCoords.push(currentLatLng);
                            pathLine.setLatLngs(pathCoords);
                        }
                    } else {
                        pathCoords.push(currentLatLng);
                    }
                    
                    ultimaPos = { lat: latitude, lon: longitude };
                    document.getElementById('distanciaDisplay').innerText = distanciaTotal.toFixed(2);
                    const valorKm = parseFloat(document.getElementById('valorKm').value) || 0;
                    document.getElementById('totalDisplay').innerText = formatarMoeda(distanciaTotal * valorKm);
                }, (err) => { alert("Ative seu GPS!"); }, { enableHighAccuracy: true });

            } else {
                finalizarCorrida();
            }
        }

        function finalizarCorrida() {
            const valorKm = parseFloat(document.getElementById('valorKm').value) || 0;
            const total = distanciaTotal * valorKm;

            // Preencher Modal
            document.getElementById('sumTotal').innerText = formatarMoeda(total);
            document.getElementById('sumDist').innerText = distanciaTotal.toFixed(2) + " km";
            document.getElementById('sumTempo').innerText = formatarTempo(tempoSegundos);
            document.getElementById('summaryModal').style.display = 'flex';

            // Parar rastreio
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
            if (timerInterval) clearInterval(timerInterval);

            emCorrida = false;
            document.getElementById('btnAcao').innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Iniciar Nova Corrida`;
            document.getElementById('btnAcao').className = "btn btn-start";
        }

        function fecharModal() {
            document.getElementById('summaryModal').style.display = 'none';
            document.getElementById('totalDisplay').innerText = "R$ 0,00";
            document.getElementById('distanciaDisplay').innerText = "0.00";
            document.getElementById('tempoDisplay').innerText = "00:00";
        }

        // PWA e Instalação
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => document.getElementById('installToast').classList.add('show'), 4000);
        });

        document.getElementById('btnVerInstall').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installToast').classList.remove('show');
                });
            } else {
                document.getElementById('installToast').classList.remove('show');
            }
        });

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS && !window.navigator.standalone) {
            document.getElementById('installMsg').innerText = "Compartilhar > Tela de Início";
            setTimeout(() => document.getElementById('installToast').classList.add('show'), 6000);
        }
    </script>
</body>
</html>
